<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline - CampusMarket</title>
  <meta name="theme-color" content="#1a7f64">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3f0;
      --card: #ffffff;
      --text: #1c1917;
      --muted: #78716c;
      --primary: #1a7f64;
      --primary-hover: #15664f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #e6f5f0, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      padding: 28px;
      text-align: center;
      border: 1px solid #e7e5e4;
    }
    h1 { margin: 0 0 8px; font-size: 1.8rem; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: var(--primary-hover); }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>CampusMarket cannot load fresh data right now. Reconnect to continue browsing live listings and messages.</p>
    <a href="/">Try again</a>
  </main>
</body>
</html>
